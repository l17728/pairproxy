{{define "layout"}}<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PairProxy 管理面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-indigo-700 text-white shadow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-1">
          <span class="font-bold text-base tracking-wide mr-4">PairProxy</span>
          <a href="/dashboard/overview" data-nav class="nav-link px-3 py-1.5 rounded text-sm text-indigo-200 hover:text-white hover:bg-indigo-600 transition-colors">概览</a>
          <a href="/dashboard/users"    data-nav class="nav-link px-3 py-1.5 rounded text-sm text-indigo-200 hover:text-white hover:bg-indigo-600 transition-colors">用户</a>
          <a href="/dashboard/groups"   data-nav class="nav-link px-3 py-1.5 rounded text-sm text-indigo-200 hover:text-white hover:bg-indigo-600 transition-colors">分组</a>
          <a href="/dashboard/logs"     data-nav class="nav-link px-3 py-1.5 rounded text-sm text-indigo-200 hover:text-white hover:bg-indigo-600 transition-colors">日志</a>
          <a href="/dashboard/audit"    data-nav class="nav-link px-3 py-1.5 rounded text-sm text-indigo-200 hover:text-white hover:bg-indigo-600 transition-colors">审计</a>
          <a href="/dashboard/llm"      data-nav class="nav-link px-3 py-1.5 rounded text-sm text-indigo-200 hover:text-white hover:bg-indigo-600 transition-colors">LLM</a>
          <a href="/dashboard/alerts"  data-nav class="nav-link px-3 py-1.5 rounded text-sm text-indigo-200 hover:text-white hover:bg-indigo-600 transition-colors relative">告警<span id="alertBadge" class="hidden absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full bg-red-500"></span></a>
          <a href="/dashboard/import"   data-nav class="nav-link px-3 py-1.5 rounded text-sm text-indigo-200 hover:text-white hover:bg-indigo-600 transition-colors">批量导入</a>
          <a href="/dashboard/my-usage" data-nav class="nav-link px-3 py-1.5 rounded text-sm text-indigo-200 hover:text-white hover:bg-indigo-600 transition-colors">我的用量</a>
        </div>
        <a href="/dashboard/logout" class="text-indigo-200 hover:text-white text-sm">退出</a>
      </div>
    </div>
  </nav>
  <script>
    // 根据当前路径高亮对应导航项
    (function() {
      var path = window.location.pathname.replace(/\/$/, '');
      document.querySelectorAll('[data-nav]').forEach(function(a) {
        var href = a.getAttribute('href').replace(/\/$/, '');
        if (path === href || (href !== '/dashboard' && path.startsWith(href))) {
          a.classList.remove('text-indigo-200');
          a.classList.add('text-white', 'bg-indigo-800', 'font-semibold');
        }
      });
    })();
    // 检查最近 1 小时是否有 ERROR 事件，有则在"告警"链接显示红点
    (function() {
      var since = new Date(Date.now() - 3600000).toISOString();
      fetch('/api/dashboard/events?level=error&limit=1&since=' + encodeURIComponent(since))
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.events && d.events.length > 0) {
            var badge = document.getElementById('alertBadge');
            if (badge) badge.classList.remove('hidden');
          }
        })
        .catch(function() {});
    })();
  </script>
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {{if .Flash}}
    <div class="mb-4 p-3 rounded bg-green-100 text-green-800 border border-green-300 text-sm">{{.Flash}}</div>
    {{end}}
    {{if .Error}}
    <div class="mb-4 p-3 rounded bg-red-100 text-red-800 border border-red-300 text-sm">{{.Error}}</div>
    {{end}}
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
{{end}}
