{{define "login"}}<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PairProxy 管理登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">管理员登录</h1>
    {{if .Error}}
    <div class="mb-4 p-3 rounded bg-red-100 text-red-700 text-sm">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/dashboard/login">
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">管理员密码</label>
        <input type="password" name="password" autofocus required
          class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-md text-sm transition-colors">
        登录
      </button>
    </form>
  </div>
</body>
</html>
{{end}}
