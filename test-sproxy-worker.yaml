# 集群负载均衡测试配置 — sproxy worker (sp-2)
# 链路: mockagent → cproxy(:8080) → sp-1(:9000) ⟺ sp-2(:9001) → mockllm(:11434)

listen:
  host: "127.0.0.1"
  port: 9001

llm:
  request_timeout: 30s
  targets:
    - url: "http://127.0.0.1:11434"
      api_key: "mock-key"
      provider: "anthropic"

database:
  path: "./test-cluster-worker.db"   # 独立数据库，用量由 reporter 上报至 primary
  write_buffer_size: 10
  flush_interval: 1s

auth:
  jwt_secret: "test-cluster-jwt-secret-shared-abcdef123"   # 必须与 primary 一致
  access_token_ttl: 1h
  refresh_token_ttl: 24h

admin:
  # password: testpass123
  password_hash: "$2a$12$EcRnmKwWiE4sDfBS7.T7e.qYAzoqFTE6r/oN4061UaYadMTlQKzce"

cluster:
  role: "worker"
  primary: "http://127.0.0.1:9000"   # sp-1 注册地址
  self_addr: "http://127.0.0.1:9001"
  self_weight: 50
  shared_secret: "test-cluster-hmac-secret-xyz789"   # 必须与 primary 一致
  report_interval: 3s                # 加快心跳，便于测试中快速完成注册

dashboard:
  enabled: false

# 语料采集：worker 节点写入本地 ./corpus/ 目录
# 集群中每个节点各自写入本地磁盘，文件名由 instance_id 区分
# 若需统一收集，请将 path 配置为 NFS/共享存储路径
corpus:
  enabled: true
  path: "./corpus/"
  instance_id: "9001"        # 显式指定，避免与 primary(:9000) 文件名冲突
  max_file_size: "200MB"
  min_output_tokens: 50

log:
  level: "debug"
