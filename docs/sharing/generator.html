        slides[selIdx].data={
          left:'<div style="padding:1.2vh 1.2vw;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px">\n  <h4 class="'+(L.color||'cb')+'">'+(L.title||'')+'</h4>\n  <p>'+(L.content||'')+'</p>\n</div>',
          right:'<div style="padding:1.2vh 1.2vw;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px">\n  <h4 class="'+(R.color||'cg')+'">'+(R.title||'')+'</h4>\n  <p>'+(R.content||'')+'</p>\n</div>'
        };
      }else{
        slides[selIdx].data=slideObj.data;
      }
    }else{
      slides[selIdx].layout='custom';
      slides[selIdx].data={html:slideObj.html};
    }
    save();
    // Add new slide
    addSlide();
    notify('已创建新页','ok');
  };
  container.appendChild(btn);
}

async function sendChat(){
  const input=document.getElementById('chatInput');
  const q=input.value.trim();
  if(!q)return;
  input.value='';
  addChatMsg('user',q);
  const settings=getLLMSettings();
  if(!settings){addChatMsg('error','请先配置 LLM 设置（点击顶部 ⚙️ 按钮）');return;}

  let context='当前正在编辑第 '+(selIdx+1)+' 页，布局: '+LAYOUTS[slides[selIdx].layout].label;
  if(slides[selIdx].title) context+='，标题: '+slides[selIdx].title;
  context+='\n\n整个演示共 '+slides.length+' 页：';
  slides.forEach((s,i)=>{
    context+='\n  第'+(i+1)+'页: ['+LAYOUTS[s.layout].label+'] '+(s.title||'（无标题）');
  });

  chatHistory.push({role:'user',content:q});
  const msgs=[{role:'system',content:SYSTEM_PROMPT+'\n\n---当前编辑上下文---\n'+context}];
  chatHistory.slice(-10).forEach(m=>msgs.push(m));

  try{
    const targetUrl=settings.url+'/chat/completions';
    let resp;
    try{
      resp=await fetch('/api/llm-proxy',{
        method:'POST',
        headers:{'Authorization':'Bearer '+settings.key,'Content-Type':'application/json','X-Target-URL':targetUrl},
        body:JSON.stringify({model:settings.model,messages:msgs,stream:true})
      });
      if(!resp.ok) throw new Error('proxy returned '+resp.status);
    }catch(proxyErr){
      resp=await fetch(targetUrl,{
        method:'POST',
        headers:{'Authorization':'Bearer '+settings.key,'Content-Type':'application/json'},
        body:JSON.stringify({model:settings.model,messages:msgs,stream:true})
      });
    }
    if(!resp.ok){const t=await resp.text();addChatMsg('error','API错误: '+resp.status+' '+t.substring(0,200));return;}
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let assistantMsg='';
    const msgEl=document.createElement('div');
    msgEl.className='chat-msg assistant';
    document.getElementById('chatMsgs').appendChild(msgEl);
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      const chunk=decoder.decode(value,{stream:true});
      const lines=chunk.split('\n');
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6).trim();
        if(data==='[DONE]')break;
        try{
          const j=JSON.parse(data);
          const delta=j.choices&&j.choices[0]&&j.choices[0].delta;
          if(delta&&delta.content){assistantMsg+=delta.content;msgEl.textContent=assistantMsg;
            document.getElementById('chatMsgs').scrollTop=document.getElementById('chatMsgs').scrollHeight;}
        }catch(e){}
      }
    }
    if(assistantMsg){
      chatHistory.push({role:'assistant',content:assistantMsg});
      // === Dual-mode processing ===
      // Mode A: Try JSON templates first
      const tplObjs=parseJSONTemplates(assistantMsg);
      if(tplObjs&&tplObjs.length>0){
        const badge=document.createElement('div');
        badge.style.cssText='font-size:10px;color:#69db7c;font-weight:600;margin-bottom:4px;';
        badge.textContent='📋 JSON模板模式 · '+tplObjs.length+'页';
        msgEl.appendChild(badge);

        tplObjs.forEach((tpl,idx)=>{
          const html=renderTemplate(tpl);
          if(html){
            const block=document.createElement('div');
            block.style.cssText='background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:6px 8px;margin:4px 0;font-size:10px;color:var(--dim);max-height:60px;overflow-y:hidden;font-family:var(--mono);';
            block.textContent=html.substring(0,300)+(html.length>300?'...':'');
            msgEl.appendChild(block);
            const btns=document.createElement('div');
            btns.style.cssText='display:flex;gap:6px;margin-top:2px;';
            if(tplObjs.length>1){
              const lbl=document.createElement('span');
              lbl.style.cssText='font-size:9px;color:var(--accent);font-weight:600;line-height:26px;';
              lbl.textContent='第'+(idx+1)+'页:';
              btns.appendChild(lbl);
            }
            const slideObj={_mode:'json',tpl:tpl.tpl,data:tpl.data};
            addApplyButton(btns,slideObj,'✅ 应用');
            addNewSlideButton(btns,slideObj);
            msgEl.appendChild(btns);
          }else{
            const err=document.createElement('div');
            err.style.cssText='color:#ff6b6b;font-size:10px;';
            err.textContent='⚠ 模板 "'+tpl.tpl+'" 渲染失败';
            msgEl.appendChild(err);
          }
        });
        // Auto-apply first if only one page
        if(tplObjs.length===1){
          const html=renderTemplate(tplObjs[0]);
          if(html){
            const layoutMap={cards:'cards',metrics:'metrics',blockquote:'blockquote',split:'split',flow:'flow',stages:'stages',title:'title',list:'custom'};
            const mapped=layoutMap[tplObjs[0].tpl]||'custom';
            slides[selIdx].layout=mapped;
            if(mapped==='custom') slides[selIdx].data={html};
            else slides[selIdx].data=tplObjs[0].data;
            document.getElementById('layoutSelect').value=mapped;
            renderEditor(); renderPreview(); renderList(); save();
            const note=document.createElement('div');
            note.style.cssText='color:#69db7c;font-size:10px;margin-top:4px;';
            note.textContent='✓ 已自动应用到第'+(selIdx+1)+'页';
            msgEl.appendChild(note);
          }
        }
      }else{
        // Mode B: Free HTML
        const codeBlocks=extractHTML(assistantMsg);
        if(codeBlocks.length>0){
          const badge=document.createElement('div');
          badge.style.cssText='font-size:10px;color:#ffd43b;font-weight:600;margin-bottom:4px;';
          badge.textContent='🔧 自由HTML模式 · '+codeBlocks.length+'页';
          msgEl.appendChild(badge);

          codeBlocks.forEach((code,idx)=>{
            const btns=document.createElement('div');
            btns.style.cssText='display:flex;gap:6px;margin-top:4px;';
            if(codeBlocks.length>1){
              const lbl=document.createElement('span');
              lbl.style.cssText='font-size:9px;color:var(--accent);font-weight:600;line-height:26px;';
              lbl.textContent='第'+(idx+1)+'页:';
              btns.appendChild(lbl);
            }
            const slideObj={_mode:'html',html:code};
            addApplyButton(btns,slideObj);
            addNewSlideButton(btns,slideObj);
            msgEl.appendChild(btns);
          });
        }else if(assistantMsg.includes('<div')||assistantMsg.includes('<p')){
          const cleanCode=assistantMsg.replace(/```html?/g,'').replace(/```/g,'').trim();
          const btn=document.createElement('button');
          btn.className='apply-btn';
          btn.textContent='✅ 作为HTML应用到当前页';
          btn.onclick=function(){
            slides[selIdx].layout='custom';
            slides[selIdx].data={html:cleanCode};
            document.getElementById('layoutSelect').value='custom';
            renderEditor(); renderPreview(); renderList(); save();
            notify('已应用','ok');
          };
          msgEl.appendChild(btn);
        }
      }
      // Format display
      const buttonsHtml=msgEl.querySelectorAll('button,div[style*="display:flex"],div[style*="font-size:10px"]');
      let display=assistantMsg
        .replace(/```(?:html|json)?\s*\n?([\s\S]*?)```/g,'<code>$1</code>')
        .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
        .replace(/`(.*?)`/g,'<code style="display:inline;padding:1px 4px;font-size:10px">$1</code>');
      msgEl.innerHTML=display;
      buttonsHtml.forEach(b=>msgEl.appendChild(b));
      document.getElementById('chatMsgs').scrollTop=document.getElementById('chatMsgs').scrollHeight;
    }
  }catch(e){addChatMsg('error','请求失败: '+e.message);}
}

// ===== Smart Generate — Agent Loop with auto-fix =====
async function smartGenerate(){
  const input=document.getElementById('chatInput');
  const q=input.value.trim();
  if(!q)return;
  input.value='';
  addChatMsg('user','🚀 '+q);

  const msgEl=document.createElement('div');
  msgEl.className='chat-msg assistant';
  document.getElementById('chatMsgs').appendChild(msgEl);

  // Progress indicator
  const statusEl=document.createElement('div');
  statusEl.style.cssText='font-size:11px;color:var(--accent);font-weight:600;margin-bottom:6px;';
  statusEl.textContent='⏳ 启动智能生成引擎...';
  msgEl.appendChild(statusEl);
  document.getElementById('chatMsgs').scrollTop=document.getElementById('chatMsgs').scrollHeight;

  const result = await agentLoop(q, (type, round, msg) => {
    statusEl.textContent = '🔄 第'+round+'轮: '+msg;
    document.getElementById('chatMsgs').scrollTop=document.getElementById('chatMsgs').scrollHeight;
  });

  if(result.success){
    statusEl.textContent = '✅ 第'+result.rounds+'轮完成 · '+(result.mode==='json'?'JSON模板模式':'自由HTML模式');
    statusEl.style.color='#69db7c';

    if(result.mode==='json' && result.slides){
      // Apply all template slides
      result.slides.forEach((s,i)=>{
        if(!s.html)return;
        const layoutMap={cards:'cards',metrics:'metrics',blockquote:'blockquote',split:'split',flow:'flow',stages:'stages',title:'title',list:'custom'};
        const mapped=layoutMap[s.tpl]||'custom';
        let slideData;
        if(mapped==='custom'){
          slideData={html:s.html};
        }else if(mapped==='split'&&s.data){
          const L=s.data.left||{}, R=s.data.right||{};
          slideData={
            left:'<div style="padding:1.2vh 1.2vw;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px">\n  <h4 class="'+(L.color||'cb')+'">'+(L.title||'')+'</h4>\n  <p>'+(L.content||'')+'</p>\n</div>',
            right:'<div style="padding:1.2vh 1.2vw;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px">\n  <h4 class="'+(R.color||'cg')+'">'+(R.title||'')+'</h4>\n  <p>'+(R.content||'')+'</p>\n</div>'
          };
        }else{
          slideData=s;
        }
        if(i===0){
          slides[selIdx].layout=mapped;
          slides[selIdx].data=slideData;
        }else{
          slides.splice(selIdx+i,0,{title:'',layout:mapped,data:slideData});
        }
      });
      renderEditor(); renderPreview(); renderList(); save();
      const note=document.createElement('div');
      note.style.cssText='color:#69db7c;font-size:11px;';
      note.textContent='✓ 已自动应用 '+result.slides.length+' 页幻灯片';
      msgEl.appendChild(note);
    }else if(result.html){
      // Apply free HTML
      slides[selIdx].layout='custom';
      slides[selIdx].data={html:result.html};
      document.getElementById('layoutSelect').value='custom';
      renderEditor(); renderPreview(); renderList(); save();
      const note=document.createElement('div');
      note.style.cssText='color:#69db7c;font-size:11px;';
      note.textContent='✓ 已应用到第'+(selIdx+1)+'页';
      msgEl.appendChild(note);

      // Show sandbox preview result
      const sr = executeTool('sandbox_render',{html:result.html});
      const info=document.createElement('div');
      info.style.cssText='color:var(--dim);font-size:10px;margin-top:4px;';
      info.textContent='📊 沙盒渲染: '+(sr.rendered?'成功':'失败')+' · '+sr.elementCount+'个元素 · '+sr.textLength+'字符';
      msgEl.appendChild(info);
    }
  }else{
    statusEl.textContent = '❌ 失败: '+(result.error||'未知错误');
    statusEl.style.color='#ff6b6b';
    if(result.rounds) statusEl.textContent += ' (经过'+result.rounds+'轮尝试)';
  }
  document.getElementById('chatMsgs').scrollTop=document.getElementById('chatMsgs').scrollHeight;
}

function extractHTML(text){
  const blocks=[];
  const regex=/```(?:html)?\s*\n?([\s\S]*?)```/g;
  let m;
  while((m=regex.exec(text))!==null){
    const code=m[1].trim();
    if(code.includes('<'))blocks.push(code);
  }
  if(blocks.length===1&&blocks[0].includes('<!-- PAGE BREAK -->')){
    return blocks[0].split('<!-- PAGE BREAK -->').map(s=>s.trim()).filter(s=>s.length>0);
  }
  return blocks;
}
