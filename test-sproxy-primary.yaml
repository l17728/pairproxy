# 集群负载均衡测试配置 — sproxy primary (sp-1)
# 链路: mockagent → cproxy(:8080) → sp-1(:9000) ⟺ sp-2(:9001) → mockllm(:11434)

listen:
  host: "127.0.0.1"
  port: 9000

llm:
  request_timeout: 30s
  targets:
    - url: "http://127.0.0.1:11434"
      api_key: "mock-key"
      provider: "anthropic"

database:
  path: "./test-cluster-primary.db"
  write_buffer_size: 10
  flush_interval: 1s

auth:
  jwt_secret: "test-cluster-jwt-secret-shared-abcdef123"
  access_token_ttl: 1h
  refresh_token_ttl: 24h

admin:
  # password: testpass123
  password_hash: "$2a$12$EcRnmKwWiE4sDfBS7.T7e.qYAzoqFTE6r/oN4061UaYadMTlQKzce"

cluster:
  role: "primary"
  self_addr: "http://127.0.0.1:9000"
  self_weight: 50
  shared_secret: "test-cluster-hmac-secret-xyz789"
  peer_monitor_interval: 5s

dashboard:
  enabled: false

# 语料采集：primary 节点写入本地 ./corpus/ 目录
# 集群中每个节点各自写入本地磁盘，文件名由 instance_id 区分
corpus:
  enabled: true
  path: "./corpus/"
  instance_id: "9000"        # 显式指定，与 worker 节点区分
  max_file_size: "200MB"
  min_output_tokens: 50

log:
  level: "debug"
